<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+Telugu:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-hover: rgba(255, 255, 255, 0.1);
            --bg: #0c0c12;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated Background Shapes */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            animation: float 15s ease-in-out infinite;
        }
        
        .shape-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(168, 85, 247, 0.3));
            top: -15%;
            right: -15%;
            animation-delay: 0s;
        }
        
        .shape-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.35), rgba(147, 51, 234, 0.25));
            bottom: 10%;
            left: -10%;
            animation-delay: -5s;
        }
        
        .shape-3 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(99, 102, 241, 0.2));
            top: 40%;
            right: 5%;
            animation-delay: -10s;
        }
        
        .shape-4 {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.25), rgba(59, 130, 246, 0.15));
            bottom: -10%;
            left: 20%;
            animation-delay: -7s;
        }
        
        /* Additional visible shapes */
        .shape-5 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(245, 158, 11, 0.1));
            top: 20%;
            left: 10%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: -12s;
            animation-duration: 20s;
        }
        
        .shape-6 {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(124, 58, 237, 0.15));
            top: 60%;
            left: 40%;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation-delay: -8s;
            animation-duration: 18s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        /* Glass Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 16px;
            padding-top: max(env(safe-area-inset-top), 12px);
            background: rgba(12, 12, 18, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            backdrop-filter: blur(10px);
            line-height: 1;
            padding-top: 2px;
        }
        
        .brand-text {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .section-nav {
            display: flex;
            gap: 8px;
            margin-left: auto;
            margin-right: 16px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        
        .nav-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .refresh-btn {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .refresh-btn.spinning svg {
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Main Content */
        .container {
            position: relative;
            z-index: 1;
            padding: 90px 12px 40px;
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Glass Cards */
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px);
        }
        
        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card-image-wrap {
            position: relative;
            overflow: hidden;
            height: 260px;
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .card-content {
            padding: 22px;
        }
        
        .card-title {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 21px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        
        .card-actions {
            display: flex;
            gap: 12px;
        }
        
        /* Rashi Phalalu Card */
        .rashi-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 28px;
            backdrop-filter: blur(20px);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .rashi-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .rashi-title {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .rashi-date {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .rashi-section {
            margin-bottom: 24px;
        }
        
        .rashi-section:last-of-type {
            margin-bottom: 0;
        }
        
        .rashi-section-title {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .rashi-text {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 17px;
            line-height: 1.8;
            color: var(--text);
            opacity: 0.95;
        }
        
        .rashi-source {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        
        .btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        
        .loader {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--text);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        /* Centered Popup Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-card {
            background: rgba(20, 20, 28, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
        }
        
        .modal-header {
            padding: 20px 24px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .summary-text {
            font-family: 'Noto Sans Telugu', sans-serif;
            font-size: 18px;
            line-height: 1.7;
            color: var(--text);
        }
        
        .generating {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            padding: 30px 0;
            justify-content: center;
        }
        
        .generating-dots {
            display: flex;
            gap: 4px;
        }
        
        .generating-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
        }
        
        .generating-dots span:nth-child(1) { animation-delay: -0.32s; }
        .generating-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .modal-footer {
            padding: 0 24px 24px;
        }
        
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        
        .retry-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
        }
        
        @media (min-width: 768px) {
            .container {
                max-width: 700px;
                margin: 0 auto;
            }
            
            .card-image-wrap {
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="shape shape-6"></div>
    </div>

    <header class="header" id="header">
        <div class="brand">
            <div class="brand-text" style="font-family: 'Noto Sans Telugu', sans-serif; font-size: 22px; font-weight: 600;">తెలుగు వార్తలు</div>
        </div>
        <nav class="section-nav">
            <button class="nav-btn active" id="newsTab" onclick="switchSection('news')">వార్తలు</button>
            <button class="nav-btn" id="rashiTab" onclick="switchSection('rashi')">రాశి ఫలాలు</button>
        </nav>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshPage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
        </button>
    </header>
    
    <main class="container" id="container">
        <!-- News Section -->
        <div id="newsSection">
            <div class="loading" id="loading">
                <div class="loader"></div>
                <div>Loading news...</div>
            </div>
            <div id="newsList"></div>
        </div>
        
        <!-- Rashi Phalalu Section -->
        <div id="rashiSection" style="display: none;">
            <div class="rashi-card" id="rashiCard">
                <div class="rashi-header">
                    <div class="rashi-title">మకరం (Capricorn)</div>
                    <div class="rashi-date" id="rashiDate"></div>
                </div>
                <div class="rashi-content">
                    <div class="rashi-section">
                        <div class="rashi-section-title">ఈరోజు రాశి ఫలం</div>
                        <div class="rashi-text" id="todayPrediction">Loading...</div>
                    </div>
                    <div class="rashi-section">
                        <div class="rashi-section-title">ఈ వారం రాశి ఫలం</div>
                        <div class="rashi-text" id="weeklyPrediction">Loading...</div>
                    </div>
                </div>
                <div class="rashi-source">Source: Eenadu</div>
            </div>
        </div>
    </main>
    
    <!-- Centered Popup Modal -->
    <div class="modal-overlay" id="aiModal" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">Summary</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="generating">
                    <div class="generating-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span>Thinking...</span>
                </div>
            </div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>
    
    <script>
        let articles = [];
        
        async function refreshPage() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            try {
                // Call refresh endpoint to fetch latest news
                const res = await fetch('/api/refresh', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    // Wait 2 seconds then reload to show new data
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                } else {
                    throw new Error('Refresh failed');
                }
            } catch (err) {
                console.error('Refresh error:', err);
                btn.classList.remove('spinning');
                alert('Failed to refresh. Please try again.');
            }
        }
        
        let currentSection = 'news';
        let rashiData = null;
        
        function switchSection(section) {
            currentSection = section;
            const newsTab = document.getElementById('newsTab');
            const rashiTab = document.getElementById('rashiTab');
            const newsSection = document.getElementById('newsSection');
            const rashiSection = document.getElementById('rashiSection');
            
            if (section === 'news') {
                newsTab.classList.add('active');
                rashiTab.classList.remove('active');
                newsSection.style.display = 'block';
                rashiSection.style.display = 'none';
            } else {
                newsTab.classList.remove('active');
                rashiTab.classList.add('active');
                newsSection.style.display = 'none';
                rashiSection.style.display = 'block';
                loadRashiPhalalu();
            }
        }
        
        async function loadRashiPhalalu() {
            if (rashiData) return;
            
            try {
                const res = await fetch('/api/rashiphalalu');
                rashiData = await res.json();
                
                document.getElementById('rashiDate').textContent = rashiData.date || new Date().toLocaleDateString('te-IN');
                document.getElementById('todayPrediction').textContent = rashiData.today || 'ఈరోజు రాశి ఫలం అందుబాటులో లేదు.';
                document.getElementById('weeklyPrediction').textContent = rashiData.weekly || 'ఈ వారం రాశి ఫలం అందుబాటులో లేదు.';
            } catch (err) {
                console.error('Rashi load error:', err);
                document.getElementById('todayPrediction').textContent = 'సేవ అందుబాటులో లేదు.';
                document.getElementById('weeklyPrediction').textContent = '';
            }
        }
        
        async function loadNews() {
            try {
                const res = await fetch('/api/articles');
                const data = await res.json();
                articles = data.articles || [];
                renderNews();
            } catch (err) {
                console.error('Load error:', err);
                document.getElementById('newsList').innerHTML = `
                    <div class="empty-state">
                        <div>Failed to load news</div>
                        <button class="retry-btn" onclick="refreshPage()">Retry</button>
                    </div>
                `;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function renderNews() {
            if (!articles.length) {
                document.getElementById('newsList').innerHTML = 
                    '<div class="empty-state">No articles found</div>';
                return;
            }
            
            const html = articles.map((a, index) => `
                <article class="card" style="animation-delay: ${index * 0.08}s">
                    ${a.image ? `
                        <div class="card-image-wrap">
                            <img src="${a.image}" class="card-image" onerror="this.parentElement.style.display='none'" loading="lazy">
                        </div>
                    ` : ''}
                    <div class="card-content">
                        <h2 class="card-title">${escapeHtml(a.title)}</h2>
                        <div class="card-actions">
                            <button class="btn" onclick="generateSummary('${a.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                </svg>
                                Summary
                            </button>
                            <a href="${a.url}" target="_blank" class="btn btn-primary">Read More</a>
                        </div>
                    </div>
                </article>
            `).join('');
            
            document.getElementById('newsList').innerHTML = html;
            
            // Trigger animations
            setTimeout(() => {
                document.querySelectorAll('.card').forEach((card, i) => {
                    setTimeout(() => card.classList.add('visible'), i * 80);
                });
            }, 100);
        }
        
        async function generateSummary(id) {
            const article = articles.find(a => a.id === id);
            if (!article) return;
            
            // Show modal
            document.getElementById('aiModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Reset to loading state
            document.getElementById('modalBody').innerHTML = `
                <div class="generating">
                    <div class="generating-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span>Thinking...</span>
                </div>
            `;
            document.getElementById('modalFooter').innerHTML = '';
            
            try {
                const res = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: article.url, 
                        title: article.title 
                    })
                });
                
                const data = await res.json();
                
                // Clean up summary - remove "Thinking" or similar prefixes if they exist
                let summary = data.summary || '';
                summary = summary.replace(/^(thinking|processing|analyzing)[.\s]*/i, '');
                summary = summary.trim();
                
                document.getElementById('modalBody').innerHTML = `
                    <div class="summary-text">${escapeHtml(summary)}</div>
                `;
                
                document.getElementById('modalFooter').innerHTML = `
                    <a href="${article.url}" target="_blank" class="btn btn-primary" style="width: 100%;">Read Full Article</a>
                `;
                
            } catch (err) {
                document.getElementById('modalBody').innerHTML = `
                    <div class="summary-text">Failed to generate summary. Please try again.</div>
                `;
            }
        }
        
        function closeModal(e) {
            if (e && e.target !== document.getElementById('aiModal')) return;
            document.getElementById('aiModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        // Load on start
        loadNews();
    </script>
</body>
</html>
